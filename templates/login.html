{% extends 'base.html' %}

{% block title %}Login - Book Rental System{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-container">
        <h1>Login</h1>
        <form method="post" class="auth-form">
            {% csrf_token %}
            
            {% if form.non_field_errors %}
                <div class="alert alert-error">
                    {{ form.non_field_errors.0 }}
                </div>
            {% endif %}

            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" class="form-input" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" class="form-input" placeholder="Enter your password" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </div>
        </form>
        <p class="auth-link">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
    </div>
</div>
{% endblock %}
